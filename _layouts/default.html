<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}

  <!-- Primer theme CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">

  <!-- Nav bar + dark mode CSS -->
  <style>
    /* === NAV BAR === */
    .nav-bar {
      position: sticky;
      top: 0;
      z-index: 40;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(209,213,218,0.7);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    .nav-inner {
      max-width: 1012px;
      margin: 0 auto;
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-brand {
      font-weight: 700;
      font-size: 16px;
      color: #24292f;
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .nav-links { display: flex; align-items: center; gap: 4px; }
    .nav-links a {
      padding: 6px 12px;
      font-size: 14px;
      font-weight: 600;
      color: #24292f;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.12s;
    }
    .nav-links a:hover { background: rgba(3,102,214,0.08); color: #0366d6; }
    .nav-hub {
      padding: 6px 12px;
      font-size: 14px;
      font-weight: 600;
      color: #0366d6;
      text-decoration: none;
      border-radius: 8px;
      background: rgba(3,102,214,0.06);
      transition: background 0.12s;
    }
    .nav-hub:hover { background: rgba(3,102,214,0.14); }

    /* Theme toggle in nav */
    .nav-toggle {
      width: 36px; height: 36px;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      margin-left: 4px;
    }
    .nav-toggle:hover { background: #f3f4f6; }
    .nav-toggle svg { width: 18px; height: 18px; stroke: #24292f; stroke-width: 2; fill: none; }

    /* Mobile */
    .nav-mobile-btn {
      display: none;
      width: 36px; height: 36px;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      align-items: center; justify-content: center;
    }
    .nav-mobile-menu {
      display: none;
      border-top: 1px solid rgba(209,213,218,0.7);
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
    }
    .nav-mobile-menu a {
      display: block;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      color: #24292f;
      text-decoration: none;
    }
    .nav-mobile-menu a:hover { background: rgba(3,102,214,0.06); }
    @media (max-width: 767px) {
      .nav-links { display: none; }
      .nav-mobile-btn { display: flex; }
      .nav-mobile-menu.open { display: block; }
    }

    /* === DARK MODE === */
    html.dark body { background-color: #0d1117; color: #c9d1d9; }
    html.dark .nav-bar {
      background: rgba(13,17,23,0.75);
      border-bottom-color: rgba(48,54,61,0.7);
    }
    html.dark .nav-brand { color: #f0f6fc; }
    html.dark .nav-links a { color: #f0f6fc; }
    html.dark .nav-links a:hover { background: rgba(56,139,253,0.12); color: #58a6ff; }
    html.dark .nav-hub { color: #58a6ff; background: rgba(56,139,253,0.1); }
    html.dark .nav-hub:hover { background: rgba(56,139,253,0.2); }
    html.dark .nav-toggle { border-color: #30363d; background: #21262d; }
    html.dark .nav-toggle:hover { background: #30363d; }
    html.dark .nav-toggle svg { stroke: #c9d1d9; }
    html.dark .nav-mobile-btn { border-color: #30363d; background: #21262d; }
    html.dark .nav-mobile-menu {
      border-top-color: rgba(48,54,61,0.7);
      background: rgba(13,17,23,0.95);
    }
    html.dark .nav-mobile-menu a { color: #f0f6fc; }
    html.dark .nav-mobile-menu a:hover { background: rgba(56,139,253,0.08); }
    html.dark .nav-mobile-btn svg { stroke: #c9d1d9; }

    html.dark .markdown-body { color: #c9d1d9; }
    html.dark .markdown-body h1,
    html.dark .markdown-body h2,
    html.dark .markdown-body h3,
    html.dark .markdown-body h4,
    html.dark .markdown-body h5,
    html.dark .markdown-body h6 { color: #f0f6fc; border-bottom-color: #21262d; }
    html.dark .markdown-body a { color: #58a6ff; }
    html.dark .markdown-body a:hover { color: #79c0ff; }
    html.dark .markdown-body pre,
    html.dark .markdown-body code { background-color: #161b22; border-color: #30363d; }
    html.dark .markdown-body pre code { background-color: transparent; }
    html.dark .markdown-body table th,
    html.dark .markdown-body table td { border-color: #30363d; }
    html.dark .markdown-body table tr { background-color: #0d1117; }
    html.dark .markdown-body table tr:nth-child(2n) { background-color: #161b22; }
    html.dark .markdown-body table th { background-color: #161b22; }
    html.dark .markdown-body blockquote { border-left-color: #30363d; color: #8b949e; }
    html.dark .markdown-body hr { border-color: #21262d; }
    html.dark .markdown-body .highlight pre { background-color: #161b22; }
    html.dark .container-lg h1 a { color: #f0f6fc; }
    html.dark footer { color: #8b949e !important; border-top-color: #30363d !important; }
    html.dark footer a { color: #8b949e !important; }

    /* Dark mode: colored info/warning boxes - fix readability */
    html.dark .markdown-body div[style*="#f0fdf4"],
    html.dark .markdown-body div[style*="#e8f5e9"],
    html.dark .markdown-body div[style*="#e0f2f1"] { background-color: #0d2818 !important; }
    html.dark .markdown-body div[style*="#e3f2fd"],
    html.dark .markdown-body div[style*="#e1f5fe"] { background-color: #0d2137 !important; }
    html.dark .markdown-body div[style*="#e8eaf6"] { background-color: #161b2d !important; }
    html.dark .markdown-body div[style*="#fff8e1"] { background-color: #2d2610 !important; }
    html.dark .markdown-body div[style*="#fff3e0"] { background-color: #2d2010 !important; }
    html.dark .markdown-body div[style*="#ffebee"] { background-color: #3d161a !important; }
    html.dark .markdown-body div[style*="#f3e5f5"] { background-color: #281a2d !important; }
    html.dark .markdown-body div[style*="#ede7f6"] { background-color: #201a2d !important; }
    html.dark .markdown-body div[style*="#eceff1"],
    html.dark .markdown-body div[style*="#f0f0f0"],
    html.dark .markdown-body div[style*="#f4f4f4"] { background-color: #1a1d20 !important; }

    /* Ensure text inside these boxes is readable in dark mode */
    html.dark .markdown-body div[style*="background"] { color: #c9d1d9 !important; }
    html.dark .markdown-body div[style*="background"] a { color: #58a6ff !important; }
    html.dark .markdown-body div[style*="background"] code { color: #f0f6fc !important; }

    html.dark #themeToggle .moon, html:not(.dark) #themeToggle .sun { display: none; }
  </style>

  <!-- Theme init -->
  <script>
    (function(){
      try {
        var t = localStorage.getItem('theme');
        if (t === 'dark') document.documentElement.classList.add('dark');
        else if (t === 'light') document.documentElement.classList.remove('dark');
        else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.add('dark');
      } catch(e){}
    })();
  </script>
</head>
<body>

<!-- NAV BAR -->
<nav class="nav-bar">
  <div class="nav-inner">
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="https://duaselipar.github.io/" class="nav-brand">DuaSelipar Dev Hub</a>
      <a href="https://duaselipar.github.io/" class="nav-hub" style="font-size:12px;padding:3px 8px;">← Hub</a>
    </div>
    <div class="nav-links" id="navLinks">
      <a href="https://duaselipar.github.io/">Home</a>
      <a href="https://github.com/duaselipar/eudemons-cq_action-guide" target="_blank">GitHub</a>
      <a href="https://www.facebook.com/profile.php?id=61554036273018" target="_blank">Facebook</a>
      <button class="nav-toggle" id="themeToggle" title="Toggle dark mode">
        <svg class="moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2m10-10h-2M4 12H2m16.95 6.95-1.41-1.41M6.46 6.46 5.05 5.05m13.49 0-1.41 1.41M6.46 17.54l-1.41 1.41"/></svg>
      </button>
    </div>
    <button class="nav-mobile-btn" id="navMobileBtn" aria-label="Menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#24292f" stroke-width="2">
        <path d="M3 6h18M3 12h18M3 18h18"/>
      </svg>
    </button>
  </div>
  <div class="nav-mobile-menu" id="navMobileMenu">
    <a href="https://duaselipar.github.io/">← DuaSelipar Dev Hub</a>
    <a href="https://github.com/duaselipar/eudemons-cq_action-guide" target="_blank">GitHub</a>
    <a href="https://www.facebook.com/profile.php?id=61554036273018" target="_blank">Facebook</a>
  </div>
</nav>

<!-- CONTENT: standard Primer layout -->
<div class="container-lg px-3 my-5 markdown-body">
  {% if site.title and page.url == "/" or page.url == "/README.html" %}
    <h1><a href="{{ "/" | relative_url }}">{{ site.title }}</a></h1>
  {% endif %}

  {{ content }}
</div>

<!-- FOOTER -->
<footer style="border-top:1px solid #d0d7de; padding:24px 0; text-align:center; font-size:14px; color:#656d76;">
  © <span id="footerYear"></span> DuaSelipar Dev Hub ·
  <a href="https://github.com/duaselipar/eudemons-cq_action-guide" target="_blank" style="color:#656d76;">GitHub</a> ·
  <a href="https://www.facebook.com/profile.php?id=61554036273018" target="_blank" style="color:#656d76;">Facebook</a>
</footer>

<!-- Scripts -->
<script>
  // Theme toggle
  document.getElementById('themeToggle').addEventListener('click', function(){
    var isDark = document.documentElement.classList.toggle('dark');
    try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch(e){}
  });

  // Mobile nav
  var mb = document.getElementById('navMobileBtn');
  var mm = document.getElementById('navMobileMenu');
  mb.addEventListener('click', function(){ mm.classList.toggle('open'); });
  mm.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click', function(){ mm.classList.remove('open'); });
  });

  // Footer year
  document.getElementById('footerYear').textContent = new Date().getFullYear();
</script>

</body>
</html>
